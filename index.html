<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Você ❤️</title>

<style>

body {

  margin:0;
  padding:0;

  font-family:'Georgia','Times New Roman',serif;

  background:#000;
  color:#fff;

  display:flex;
  flex-direction:column;
  align-items:center;

  height:100vh;
  overflow:hidden;

}


#startScreen {

  padding:15px 30px;

  background:white;
  color:black;

  border:none;
  border-radius:12px;

  cursor:pointer;

  font-size:20px;

  margin-top:30px;

  font-weight:bold;

}



#conteudo {

  display:none;

  width:90%;
  max-width:700px;

  height:80vh;

  margin-top:20px;

  line-height:1.9;

  text-align:left;

  overflow-y:auto;

  scroll-behavior:smooth;

  font-size:1.25em;

}



.carta {

  margin-bottom:45px;

  opacity:0;

  animation:aparecer 2s forwards;

}


@keyframes aparecer {

from {

  opacity:0;

  transform:translateY(20px);

}


to {

  opacity:1;

  transform:translateY(0);

}

}



/* BOTÃO FINAL */

#final {

  display:none;

  text-align:center;

  font-size:1.5em;

  margin-top:50px;

}


#botaoFinal {

  margin-top:30px;

  padding:15px 30px;

  background:white;

  color:black;

  border:none;

  border-radius:15px;

  font-size:20px;

  font-weight:bold;

  cursor:pointer;

}



</style>

</head>


<body>


<div id="startScreen">

Toque para iniciar ❤️

</div>



<div id="conteudo">


<div id="texto"></div>



<div id="final">

Obrigado por existir ❤️

<br><br>


<button id="botaoFinal">

Eu escolheria você para sempre ❤️

</button>


</div>


</div>



<audio id="audio1" src="intro.mp3"></audio>

<audio id="audio2" src="musica.mp3"></audio>




<script>


const startScreen = document.getElementById("startScreen");

const conteudo = document.getElementById("conteudo");

const texto = document.getElementById("texto");

const final = document.getElementById("final");

const audio1 = document.getElementById("audio1");

const audio2 = document.getElementById("audio2");

const botaoFinal = document.getElementById("botaoFinal");




// ==================================
// COLOQUE SUA CARTA AQUI
// CADA ITEM = UMA ESTROFE
// UMA ESTROFE APARECE
// ESPERA 20 SEGUNDOS
// APARECE A PRÓXIMA
// ==================================


const carta = [

`ESTROFE 1:

omo vai ser o nosso primeiro abraço e só de pensar nisso meu coração fica em paz porque é com você que eu quero viver esses momentos e se por algum motivo a gente ainda tiver que esperar mais eu espero espero o tempo que for preciso um mês um ano ou o tempo que a vida pedir porque pra mim vale a pena esperar por você você vale a pena algumas pessoas passam pela nossa vida e deixam lembranças mas você se tornou parte de quem eu sou e eu nunca teria pressa para desistir de alguém que significa tanto pra mim então por favor não desiste da gente por achar que você não é suficiente pra mim você sempre foi e sempre vai ser eu te amo com todo o meu coração e enquanto existir uma chance de ter você na minha vida eu vou continuar escolhendo você todos os dias todas as vezes sem pensar duas vezes porque amar você nunca foi um peso sempre foi um privilégio vida às vezes eu fico pensando em como a nossa mente pode ser cruel com a gente ela pega as nossas maiores feridas e transforma em espelhos fazendo a gente enxergar defeitos onde na verdade só existem marcas de quem lutou demais e eu tenho medo de que você esteja acreditando nesses espelhos quebrados como se eles mostrassem a verdade mas não mostram uma pessoa machucada nunca consegue se enxergar por inteiro ela só enxerga a própria dor e eu queria tanto que por um instante você conseguisse se enxergar pelos meus olhos porque você descobriria uma pessoa linda forte e muito maior do que qualquer sofrimento tem uma frase que diz que quem olha para fora sonha quem olha para dentro desperta eu queria que quando você olhasse para dentro de si encontrasse a mulher incrível que eu conheço e não apenas o sofrimento que você está vivendo agora porque a dor é um momento da sua história não a sua identidade você não é tristeza você não é abandono você não é os problemas da sua vida você é infinitamente maior do que tudo isso e eu espero que um dia você consiga acreditar em si da mesma forma que eu acredito porque você merece enxergar a própria luz .`,



`ESTROFE 2:

COLOQUE AQUI A SEGUNDA PARTE.

Exemplo:

Eu sei que as coisas estão difíceis,
mas eu quero que você saiba que eu estou aqui.`,




`ESTROFE 3:

COLOQUE AQUI A TERCEIRA PARTE.

Exemplo:

Eu escolheria você mil vezes,
porque é você quem eu quero ao meu lado.`,




`ESTROFE 4:

CONTINUE COLOCANDO SUAS ESTROFES AQUI.`



];





// ==================================
// MOSTRAR CARTA
// ==================================


function escreverCarta(){


let i = 0;


function mostrar(){


if(i < carta.length){


let p = document.createElement("p");


p.className="carta";


p.textContent = carta[i];


texto.appendChild(p);



p.scrollIntoView({

behavior:"smooth",

block:"end"

});



i++;



// 20 segundos

setTimeout(mostrar,20000);



}

else{


final.style.display="block";


}


}


mostrar();


}






// ==================================
// TROCA DE MÚSICA
// ==================================


function crossfade(){


audio2.volume=0;

audio2.play();


let volume=0;


let fade=setInterval(()=>{


volume+=0.05;


audio1.volume=1-volume;

audio2.volume=volume;



if(volume>=1){


clearInterval(fade);

audio1.pause();


}



},200);



}






// ==================================
// INICIAR
// ==================================


startScreen.addEventListener("click",()=>{


startScreen.style.display="none";


conteudo.style.display="block";



audio1.volume=1;

audio1.play();



escreverCarta();



// troca música depois de 30 segundos

setTimeout(()=>{


crossfade();


},30000);



});





// botão final

botaoFinal.addEventListener("click",()=>{


botaoFinal.textContent="Eu escolheria você em todas as vidas ❤️";


});



</script>


</body>

</html>
