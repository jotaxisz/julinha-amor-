<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Você ❤️</title>

<style>

body {

  margin:0;
  padding:0;

  font-family:'Georgia','Times New Roman',serif;

  background:#000;
  color:#fff;

  display:flex;
  flex-direction:column;
  align-items:center;

  height:100vh;
  overflow:hidden;

}


/* BOTÃO */

#startScreen {

  padding:15px 30px;

  background:white;
  color:black;

  border:none;
  border-radius:12px;

  cursor:pointer;

  font-size:20px;

  margin-top:30px;

  font-weight:bold;

}


/* CONTEÚDO */

#conteudo {

  display:none;

  width:90%;
  max-width:700px;

  height:80vh;

  margin-top:20px;

  line-height:1.9;

  text-align:left;

  overflow-y:auto;

  scroll-behavior:smooth;

  font-size:1.25em;

}


/* ESTROFES */

.carta {

  margin-bottom:45px;

  opacity:0;

  animation:aparecer 2s forwards;

}


@keyframes aparecer {

from {

  opacity:0;

  transform:translateY(20px);

}


to {

  opacity:1;

  transform:translateY(0);

}

}


/* FINAL */

#final {

  display:none;

  text-align:center;

  font-size:1.5em;

  margin-top:50px;

}


</style>

</head>


<body>


<div id="startScreen">

Toque para iniciar ❤️

</div>



<div id="conteudo">

<div id="texto"></div>


<div id="final">

Obrigado por existir ❤️

<br><br>

Eu escolheria você em todas as vidas.

</div>


</div>



<audio id="audio1" src="intro.mp3"></audio>

<audio id="audio2" src="musica.mp3"></audio>



<script>


const startScreen = document.getElementById("startScreen");

const conteudo = document.getElementById("conteudo");

const texto = document.getElementById("texto");

const final = document.getElementById("final");

const audio1 = document.getElementById("audio1");

const audio2 = document.getElementById("audio2");




// ==================================
// COLOQUE SUA CARTA AQUI
// CADA ITEM É UMA ESTROFE
// APARECE UMA -> ESPERA 20 SEGUNDOS -> PRÓXIMA
// ==================================


const carta = [


"COLOQUE A PRIMEIRA ESTROFE AQUI",


"COLOQUE A SEGUNDA ESTROFE AQUI",


"COLOQUE A TERCEIRA ESTROFE AQUI",


"CONTINUE COLOCANDO SUAS ESTROFES AQUI"


];




// ==================================
// MOSTRAR CARTA
// ==================================


function escreverCarta(){


let i = 0;



function mostrar(){


if(i < carta.length){



let p = document.createElement("p");


p.className = "carta";



p.textContent = carta[i];



texto.appendChild(p);



p.scrollIntoView({

behavior:"smooth",

block:"end"

});



i++;


// TEMPO ENTRE CADA ESTROFE
// 20000 = 20 segundos
// 30000 = 30 segundos
// 10000 = 10 segundos

setTimeout(mostrar,20000);



}else{


final.style.display="block";


}


}



mostrar();


}





// ==================================
// TROCA DE MÚSICA
// ==================================


function crossfade(){


audio2.volume = 0;

audio2.play();



let volume = 0;



let fade = setInterval(()=>{


volume += 0.05;


audio1.volume = 1 - volume;

audio2.volume = volume;



if(volume >= 1){


clearInterval(fade);

audio1.pause();


}



},200);



}





// ==================================
// INICIAR
// ==================================


startScreen.addEventListener("click",()=>{


startScreen.style.display="none";


conteudo.style.display="block";



audio1.volume = 1;

audio1.play();



escreverCarta();



// troca música depois de 30 segundos

setTimeout(()=>{

crossfade();

},30000);



});



</script>


</body>

</html>
